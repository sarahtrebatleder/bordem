<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="What to Do" />
  <meta name="theme-color" content="#f5f0e8" />
  <title>What to Do</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0e8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
      padding-top: max(env(safe-area-inset-top), 48px);
    }

    .container { max-width: 480px; width: 100%; }

    .header {
      margin-bottom: 36px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    h1 {
      font-size: 26px;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: #2a2a2a;
    }

    .subtitle { color: #999; margin-top: 5px; font-size: 13px; }

    .save-status {
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      white-space: nowrap;
      padding-bottom: 2px;
    }
    .save-status.error { color: #c0392b; }
    .save-status.syncing { color: #e8a020; }

    .card {
      background: #fff;
      border: 1px solid #e0d9cc;
      border-radius: 6px;
      padding: 36px 28px;
      margin-bottom: 28px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card-hint { color: #bbb; font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
    .suggestion { font-size: 22px; color: #2a2a2a; margin-bottom: 28px; line-height: 1.4; }
    .done-msg { color: #999; font-size: 15px; margin-bottom: 20px; }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 0.02em;
      cursor: pointer;
      border-radius: 3px;
      padding: 10px 22px;
      transition: opacity 0.15s;
    }

    button:active { opacity: 0.75; }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-primary { background: #2a2a2a; color: #fff; border: 1px solid #2a2a2a; }
    .btn-success { background: #3a7d44; color: #fff; border: 1px solid #3a7d44; }
    .btn-ghost { background: #fff; color: #2a2a2a; border: 1px solid #ccc; }

    .add-row { display: flex; gap: 8px; margin-bottom: 20px; }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d8d0c4;
      border-radius: 3px;
      font-size: 14px;
      font-family: inherit;
      background: #faf8f4;
      color: #2a2a2a;
      outline: none;
    }

    .add-row input:focus { border-color: #a09080; }

    .toggle-link {
      background: none;
      border: none;
      font-size: 13px;
      color: #999;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      font-family: inherit;
    }

    .activity-list {
      margin-top: 14px;
      list-style: none;
      border: 1px solid #e0d9cc;
      border-radius: 4px;
      background: #fff;
      max-height: 300px;
      overflow-y: auto;
    }

    .activity-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      font-size: 14px;
      color: #2a2a2a;
      border-bottom: 1px solid #f0ebe2;
    }

    .activity-list li:last-child { border-bottom: none; }

    .remove-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: #999; }
    .empty-msg { padding: 14px 16px; color: #bbb; font-size: 14px; font-style: italic; }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #f5f0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      color: #bbb;
      font-size: 15px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="loading-screen">Connecting…</div>

  <div class="container" style="opacity:0;transition:opacity 0.3s" id="app">
    <div class="header">
      <div>
        <h1>What should I do?</h1>
        <p class="subtitle" id="count"></p>
      </div>
      <span class="save-status" id="save-status">✓ Synced</span>
    </div>

    <div class="card" id="card"></div>

    <div class="add-row">
      <input type="text" id="new-item" placeholder="Add an activity…" onkeydown="if(event.key==='Enter') handleAdd()" />
      <button class="btn-primary" onclick="handleAdd()">Add</button>
    </div>

    <button class="toggle-link" id="toggle-btn" onclick="toggleEdit()">Edit list</button>
    <ul class="activity-list" id="activity-list" style="display:none"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYHU-yUwaIlUG27wnnwiCFZWLMupDI-M0",
      authDomain: "bordem-44e21.firebaseapp.com",
      projectId: "bordem-44e21",
      storageBucket: "bordem-44e21.firebasestorage.app",
      messagingSenderId: "30536291883",
      appId: "1:30536291883:web:b2ce8618a86887e9a1fc6e"
    };

    const DEFAULT_ACTIVITIES = [
      "Go for a walk",
      "Read a book",
      "Do a crossword puzzle",
      "Stretch for 10 minutes",
      "Call a friend",
      "Cook something new",
      "Watch a documentary",
      "Sketch or doodle",
      "Listen to an album start to finish",
      "Organize one drawer",
      "Journal for 5 minutes",
      "Do a math puzzle",
    ];

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "data", "activities");

    let activities = [];
    let queue = [];
    let current = null;
    let editOpen = false;
    let saveTimer = null;
    window._done = false;

    async function initData() {
      try {
        const snap = await getDoc(docRef);
        if (snap.exists() && Array.isArray(snap.data().list) && snap.data().list.length > 0) {
          activities = snap.data().list;
        } else {
          activities = [...DEFAULT_ACTIVITIES];
          await setDoc(docRef, { list: activities });
        }
      } catch(e) {
        activities = [...DEFAULT_ACTIVITIES];
        setStatus('error');
      }

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.opacity = '1';
      render();

      // Real-time listener — syncs changes from any device instantly
      onSnapshot(docRef, (snap) => {
        if (snap.exists() && Array.isArray(snap.data().list)) {
          activities = snap.data().list;
          render();
          setStatus('synced');
        }
      });
    }

    async function saveToFirestore() {
      clearTimeout(saveTimer);
      setStatus('syncing');
      saveTimer = setTimeout(async () => {
        try {
          await setDoc(docRef, { list: activities });
          setStatus('synced');
        } catch(e) {
          setStatus('error');
        }
      }, 500);
    }

    function setStatus(s) {
      const el = document.getElementById('save-status');
      el.className = 'save-status' + (s === 'error' ? ' error' : s === 'syncing' ? ' syncing' : '');
      el.textContent = s === 'syncing' ? 'Syncing…' : s === 'error' ? 'Sync failed' : '✓ Synced';
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      document.getElementById('count').textContent = activities.length + ' activities in your list';
      renderCard();
      renderList();
      document.getElementById('toggle-btn').textContent =
        editOpen ? 'Hide list' : `Edit list (${activities.length})`;
    }

    function renderCard() {
      const card = document.getElementById('card');
      if (current) {
        card.innerHTML = `
          <p class="suggestion">${escHtml(current)}</p>
          <div class="btn-row">
            <button class="btn-success" id="yep-btn">Sounds good</button>
            <button class="btn-ghost" id="nope-btn">Nope, next</button>
          </div>`;
        document.getElementById('yep-btn').onclick = handleYep;
        document.getElementById('nope-btn').onclick = handleNope;
      } else if (window._done) {
        card.innerHTML = `
          <p class="done-msg">You've seen everything. Starting over.</p>
          <div class="btn-row">
            <button class="btn-primary" id="again-btn">Go again</button>
          </div>`;
        document.getElementById('again-btn').onclick = handleStart;
      } else {
        card.innerHTML = `
          <p class="card-hint">Press the button when you're not sure what to do.</p>
          <div class="btn-row">
            <button class="btn-primary" id="suggest-btn" ${activities.length === 0 ? 'disabled' : ''}>Suggest something</button>
          </div>`;
        document.getElementById('suggest-btn').onclick = handleStart;
      }
    }

    function renderList() {
      const ul = document.getElementById('activity-list');
      if (!editOpen) { ul.style.display = 'none'; return; }
      ul.style.display = 'block';
      if (activities.length === 0) {
        ul.innerHTML = '<li class="empty-msg">No activities yet.</li>';
        return;
      }
      ul.innerHTML = activities.map((a, i) => `
        <li>
          <span>${escHtml(a)}</span>
          <button class="remove-btn" data-i="${i}">×</button>
        </li>`).join('');
      ul.querySelectorAll('.remove-btn').forEach(btn => {
        btn.onclick = () => handleRemove(parseInt(btn.dataset.i));
      });
    }

    function getNext(q) {
      if (activities.length === 0) return;
      if (q.length === 0) q = shuffle(activities);
      current = q[0];
      queue = q.slice(1);
      window._done = false;
    }

    function handleStart() { getNext([]); render(); }

    function handleNope() {
      if (queue.length === 0 && current) {
        current = null; window._done = true;
      } else {
        getNext(queue);
      }
      render();
    }

    function handleYep() { current = null; queue = []; window._done = false; render(); }

    function handleAdd() {
      const input = document.getElementById('new-item');
      const val = input.value.trim();
      if (!val || activities.includes(val)) return;
      activities.push(val);
      input.value = '';
      input.focus();
      saveToFirestore();
      render();
    }

    function handleRemove(i) {
      const removed = activities[i];
      activities.splice(i, 1);
      if (current === removed) { current = null; queue = []; }
      saveToFirestore();
      render();
    }

    function toggleEdit() {
      editOpen = !editOpen;
      renderList();
      document.getElementById('toggle-btn').textContent =
        editOpen ? 'Hide list' : `Edit list (${activities.length})`;
    }

    // Expose to global scope for inline handlers
    window.handleAdd = handleAdd;
    window.toggleEdit = toggleEdit;

    initData();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
